name: dbt_ci_check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_dbt_tests:
    runs-on: ubuntu-latest

    env:
      GITHUB_REF_NAME: ${{ github.ref_name }}
      DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install dbt-databricks sqlfluff-templater-dbt

      - name: Install dbt packages
        working-directory: ./dbt_analytics
        run: dbt deps

      - name: Get changed files
        id: get_file_changes
        uses: tj-actions/changed-files@v42
        with:
          base_sha: main
          path: dbt_analytics
          files: |
            models/**/*.sql

      - name: Run SQLFluff
        if: steps.get_file_changes.outputs.any_changed == 'true'
        working-directory: ./dbt_analytics
        run: |
          sqlfluff lint ${{ steps.get_file_changes.outputs.all_changed_files }}

      # --- SLIM CI LOGIC ---

      - name: Restore manifest from cache
        if: github.ref != 'refs/heads/main'
        uses: actions/cache/restore@v3
        with:
          path: ./dbt_analytics/target/manifest.json
          key: dbt-manifest-main-${{ github.run_id }}
          restore-keys: |
            dbt-manifest-main-

      - name: Run dbt
        working-directory: ./dbt_analytics
        run: |
          echo "Step 1: Loading Bronze data..."
          dbt run-operation load_all_sources --target ci

          echo "Step 2: Running Transformations..."

          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "BRANCH IS MAIN: Generating baseline manifest..."
            # Генерируем манифест для будущих PR. 
            # Важно: используем prod, чтобы defer в PR ссылался на продакшн-схемы
            dbt compile --target prod --no-partial-parse
            
          elif [ -f "target/manifest.json" ]; then
            echo "BRANCH IS PR: Running Slim CI..."
            
            # Создаем папку для базового состояния (из мастера)
            mkdir -p master_state
            cp target/manifest.json master_state/manifest.json
            
            # ОЧИЩАЕМ target, чтобы dbt не сравнивал манифест сам с собой
            rm -rf target/
            
            # Запускаем билд. 
            # dbt сам скомпилирует текущий код в новую папку target 
            # и сравнит её с тем, что в master_state
            dbt build \
              --target ci \
              --select state:modified+ \
              --state master_state \
              --defer \
              --defer-state master_state \
              --no-partial-parse
          else
            echo "NO MANIFEST: Full build..."
            dbt build --target ci
          fi

            - name: Cache manifest
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/cache/save@v3
              with:
                path: ./dbt_analytics/target/manifest.json
                key: dbt-manifest-main-${{ github.run_id }}

            # --- POST-BUILD CHECKS ---

            - name: Check Source Freshness
              run: dbt source freshness
              working-directory: ./dbt_analytics

            - name: Run cleanup schema
              if: always()
              run: |
                dbt run-operation drop_ci_schema --args "{schema_name: ci_schema_${{ github.run_id }}}"
              working-directory: ./dbt_analytics