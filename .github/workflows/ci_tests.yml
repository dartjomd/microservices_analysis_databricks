name: dbt_ci_check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_dbt_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install dbt-databricks sqlfluff-templater-dbt

      - name: Get changed files
        id: get_file_changes
        uses: tj-actions/changed-files@v42
        with:
          base_sha: main
          path: dbt_analytics
          files: |
            models/**/*.sql

      - name: Run SQLFluff
        if: steps.get_file_changes.outputs.any_changed == 'true'
        working-directory: ./dbt_analytics
        run: |
          sqlfluff lint ${{ steps.get_file_changes.outputs.all_changed_files }}

      # --- SLIM CI LOGIC ---

      - name: Restore manifest from cache
        if: github.ref != 'refs/heads/main' 
        uses: actions/cache/restore@v3
        with:
          path: ./dbt_analytics/target/manifest.json
          # Используем префикс, чтобы всегда брать САМЫЙ НОВЫЙ манифест из мастера
          key: dbt-manifest-main-${{ github.run_id }}
          restore-keys: |
            dbt-manifest-main-

      - name: Run dbt
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}
        working-directory: ./dbt_analytics
        run: |
          dbt deps
          
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "BRANCH IS MAIN: Generating clean manifest..."
            dbt compile --target prod
          elif [ -f "target/manifest.json" ]; then
            echo "BRANCH IS PR: Running Slim CI with defer to silver..."
            mkdir -p state
            cp target/manifest.json state/manifest.json
            dbt build --target ci --select state:modified+ --state state --defer
          else
            echo "NO MANIFEST: Running full build..."
            dbt build --target ci
          fi

      - name: Cache manifest
        # Сохраняем ТОЛЬКО в мастере и только если билд прошел успешно
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v3
        with:
          path: ./dbt_analytics/target/manifest.json
          # Run_id гарантирует уникальность ключа, чтобы запись в кэш не падал
          key: dbt-manifest-main-${{ github.run_id }}

      # --- POST-BUILD CHECKS ---

      - name: Check Source Freshness
        run: dbt source freshness
        working-directory: ./dbt_analytics

      - name: Run cleanup schema
        if: always() 
        run: |
          dbt run-operation drop_ci_schema --args "{schema_name: ci_schema_${{ github.run_id }}}"
        working-directory: ./dbt_analytics