on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run_dbt_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install dbt-databricks sqlfluff-templater-dbt

      - name: Get changed files
        id: get_file_changes
        uses: tj-actions/changed-files@v42
        with:
          # Это обеспечит работу и в PR, и в обычных пушах
          files: dbt_analytics/models/**/*.sql

      - name: Setup dbt Profile
        # Создаем профиль ДО линтера, так как sqlfluff-dbt он нужен
        run: |
          echo "dbt_analytics:
            target: ci
            outputs:
              ci:
                type: databricks
                catalog: s3_learn
                host: ${{ secrets.DBT_DATABRICKS_HOST }}
                http_path: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
                schema: silver 
                threads: 4
                token: ${{ secrets.DBT_DATABRICKS_TOKEN }}" > ./dbt_analytics/profiles.yml

      - name: dbt deps
        run: dbt deps
        working-directory: ./dbt_analytics

      - name: Run SQLFluff
        if: steps.get_file_changes.outputs.any_changed == 'true'
        run: |
          # Запускаем из корня, чтобы он видел .sqlfluff
          # Но передаем список файлов, которые нашел экшен
          sqlfluff lint ${{ steps.get_file_changes.outputs.all_changed_files }} \
          --dialect databricks \
          --profiles-dir ./dbt_analytics

      # --- ЛОГИКА SLIM CI ---
      - name: Restore manifest from cache
        if: github.ref != 'refs/heads/main' 
        uses: actions/cache/restore@v3
        with:
          path: ./dbt_analytics/target/manifest.json
          key: dbt-manifest-main

      - name: Run dbt
        working-directory: ./dbt_analytics
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ] && [ -f "./target/manifest.json" ]; then
            echo "Running SLIM CI..."
            mkdir -p state
            cp ./target/manifest.json ./state/manifest.json
            dbt build --select state:modified+ --state ./state --defer
          else
            echo "Running FULL BUILD..."
            dbt build
          fi

      - name: Cache manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v3
        with:
          path: ./dbt_analytics/target/manifest.json
          key: dbt-manifest-main

      - name: Check Source Freshness
        run: dbt source freshness
        working-directory: ./dbt_analytics

      # Cleanup выполняется ВСЕГДА (даже если тесты упали), 
      - name: Run cleanup schema
        if: always() 
        run: |
          dbt run-operation drop_ci_schema --args "{schema_name: staging_ci_${{ github.run_id }}}"
        working-directory: ./dbt_analytics