name: Scheduled dbt Run with Custom Alerts

on:
  schedule:
    - cron: '0 6 * * *' # Каждый день в 6 утра
  workflow_dispatch:

jobs:
  run-and-alert:
    runs-on: ubuntu-latest

    env:
      DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install dbt-databricks requests python-dotenv

      - name: Run dbt Build
        id: dbt_run
        continue-on-error: true 
        working-directory: ./dbt_analytics
        run: |
          dbt deps
          # Запускаем полный билд (Bronze + Silver + Gold + Tests + Snapshot)
          dbt build --target prod

      - name: Send Custom Telegram Alert
        if: always() 
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_RESULTS_PATH: ./dbt_analytics/target/run_results.json
        run: |
          python run.py