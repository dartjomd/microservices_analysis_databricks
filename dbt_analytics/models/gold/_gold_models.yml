version: 2

models:
  - name: mrt_service_health_hourly
    description: "Model for checking service health rate by hour"
    columns:
      - name: avg_latency
        description: "Average latency in milliseconds"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 60000

      - name: success_rate
        description: "Percentage of successful logs compared to total logs (0-100)"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: report_trunc_time
        description: "Time of report (hourly truncated)"
        tests:
          - model_freshness:
              arguments:
                max_hours: 12
              config:
                severity: warn

      - name: max_latency
        description: "Maximal latency during that period of time"

      - name: error_count
        description: "Number of logs with errors (status >= 400)"

  - name: mrt_service_error_rate
    description: "Model for checking amount of errors and total records by hour"
    columns:
      - name: report_trunc_time
        description: "Time when the data was aggregated"
        tests:
          - model_freshness:
              arguments:
                max_hours: 12
              config:
                severity: warn

      - name: total_errors
        description: "Count of error logs"
        tests:
          - not_null:
              config:
                severity: warn

      - name: total_records
        description: "Total count of logs"
        tests:
          - not_null:
              config:
                severity: warn