version: 2

sources:
  - name: s3_bronze
    description: "Raw data layer. Data is ingested from S3 buckets using Spark jobs."
    schema: >
      {%- if target.name == 'ci' and env_var('GITHUB_REF_NAME', '') != 'main' -%}
        {{ "ci_schema_" ~ env_var('GITHUB_RUN_ID', 'local') }}
      {%- else -%}
        bronze_raw
      {%- endif -%}

    tables:
      - name: microservices_logs_raw
        description: "Event logs from microservices containing latency and status codes."
        columns:
          - name: service_name
            description: "Service identifier."
          - name: status_code
            description: "HTTP status code."
        
        config:
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 4040, period: hour}
          loaded_at_field: _ingested_at


      - name: services_lookup_raw
        description: "Reference table for service tiers and categories."
        columns:
          - name: service_name
            description: "Primary key for service identification."