dbt_analytics:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: microservices_dev
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      schema: bronze
      threads: 1
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"

    ci:
      type: databricks
      catalog: microservices_dev
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"  # not needed for ci
      token: "{{ env_var('DBT_DATABRICKS_TOKEN', '') }}"
      schema: "ci_schema_{{ env_var('GITHUB_RUN_ID', 'local') }}"
      threads: 1
      auth_type: oauth
      client_id: "{{ env_var('DBT_DATABRICKS_CLIENT_ID') }}"
      client_secret: "{{ env_var('DBT_DATABRICKS_CLIENT_SECRET') }}"

    prod:
      type: databricks
      catalog: microservices_prod
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN', '') }}" # not needed for ci
      schema: bronze
      threads: 1
      auth_type: oauth
      client_id: "{{ env_var('DBT_DATABRICKS_CLIENT_ID') }}"
      client_secret: "{{ env_var('DBT_DATABRICKS_CLIENT_SECRET') }}"